# config/environment.conf
# Shared non-secret configuration for the AWS Web Platform.
# Do not store passwords, access keys, or private credentials in this file.

# --------------------------------------------------
# Project
# --------------------------------------------------

AWS_REGION="us-east-1"
ENVIRONMENT="prod"

PROJECT_NAME="aws-web-platform"
PROJECT_SHORT_NAME="web"

MANAGED_BY="aws-cli"

# --------------------------------------------------
# Network
# --------------------------------------------------

VPC_CIDR="10.0.0.0/16"
VPC_NAME="$PROJECT_NAME-vpc"

AZ1="us-east-1a"
AZ2="us-east-1b"

PUBLIC_SUBNET_A_NAME="$PROJECT_NAME-public-subnet-az1"
PUBLIC_SUBNET_B_NAME="$PROJECT_NAME-public-subnet-az2"

PRIVATE_APP_SUBNET_A_NAME="$PROJECT_NAME-private-app-subnet-az1"
PRIVATE_APP_SUBNET_B_NAME="$PROJECT_NAME-private-app-subnet-az2"

PRIVATE_DB_SUBNET_A_NAME="$PROJECT_NAME-private-db-subnet-az1"
PRIVATE_DB_SUBNET_B_NAME="$PROJECT_NAME-private-db-subnet-az2"

PUBLIC_SUBNET_A_CIDR="10.0.1.0/24"
PUBLIC_SUBNET_B_CIDR="10.0.2.0/24"

PRIVATE_APP_SUBNET_A_CIDR="10.0.11.0/24"
PRIVATE_APP_SUBNET_B_CIDR="10.0.12.0/24"

PRIVATE_DB_SUBNET_A_CIDR="10.0.21.0/24"
PRIVATE_DB_SUBNET_B_CIDR="10.0.22.0/24"

IGW_NAME="$PROJECT_NAME-igw"

PUBLIC_RT_NAME="$PROJECT_NAME-public-rt"
PRIVATE_APP_RT_A_NAME="$PROJECT_NAME-private-app-rt-a"
PRIVATE_APP_RT_B_NAME="$PROJECT_NAME-private-app-rt-b"
PRIVATE_DB_RT_NAME="$PROJECT_NAME-private-db-rt"

NAT_GW_A_NAME="$PROJECT_NAME-nat-gateway-az1"
NAT_GW_B_NAME="$PROJECT_NAME-nat-gateway-az2"

EIP_A_NAME="$PROJECT_NAME-nat-eip-az1"
EIP_B_NAME="$PROJECT_NAME-nat-eip-az2"

# --------------------------------------------------
# Security
# --------------------------------------------------

ALB_SG_NAME="$PROJECT_NAME-alb-sg"
APP_SG_NAME="$PROJECT_NAME-app-sg"
DB_SG_NAME="$PROJECT_NAME-db-sg"

ENABLE_HTTPS="false"

# --------------------------------------------------
# IAM
# --------------------------------------------------

EC2_ROLE_NAME="$PROJECT_NAME-ec2-role"
EC2_INSTANCE_PROFILE_NAME="$PROJECT_NAME-ec2-instance-profile"
SSM_MANAGED_POLICY_ARN="arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"

# --------------------------------------------------
# Compute
# --------------------------------------------------

LAUNCH_TEMPLATE_NAME="$PROJECT_NAME-app-launch-template"
INSTANCE_TYPE="t3.micro"

ASG_NAME="${ENVIRONMENT}-${PROJECT_SHORT_NAME}-app-asg"
ASG_MIN_SIZE=2
ASG_DESIRED_CAPACITY=2
ASG_MAX_SIZE=4

# --------------------------------------------------
# Load Balancing
# --------------------------------------------------

TARGET_GROUP_NAME="${ENVIRONMENT}-${PROJECT_SHORT_NAME}-app-tg"
TARGET_GROUP_HEALTH_CHECK_PATH="/health.html"

ALB_NAME="${ENVIRONMENT}-${PROJECT_SHORT_NAME}-alb"

# --------------------------------------------------
# Database
# --------------------------------------------------

DB_NAME="appdb"
DB_BACKUP_RETENTION_DAYS=7

DB_SUBNET_GROUP_NAME="${ENVIRONMENT}-${PROJECT_SHORT_NAME}-db-subnet-group"

AURORA_ENGINE="aurora-mysql"
AURORA_INSTANCE_CLASS="db.t3.medium"
AURORA_CLUSTER_IDENTIFIER="${ENVIRONMENT}-${PROJECT_SHORT_NAME}-aurora-cluster"
AURORA_WRITER_INSTANCE_IDENTIFIER="${ENVIRONMENT}-${PROJECT_SHORT_NAME}-aurora-writer-1"